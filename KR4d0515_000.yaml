body:
  text: 杏庭摘槀别集類四元提要臣等謹案杏庭摘槀一卷元洪焱祖撰焱祖字潛夫歙縣人是集前有危素序稱為徽州路休寜縣尹致仕而叙其仕履乃曰年二十六為平江路儒學録浮梁州長薌書院山長紹興路儒學正調衢州路儒學教授擢處州路遂昌縣主簿天歴元年年六十二致其仕不及其嘗為縣尹考宋濂序稱其自儒官起家四轉而為遂昌主簿遂以休寜縣尹致其仕盖是時猶沿宋例致仕者率進一官使歸實未嘗任其職也焱祖嘗作羅願爾雅翼音釋至今附願書以行又有續新安志十卷亦繼願新安志而作盖亦博洽之士是集為其子浦江尉在所編所居有銀杏樹大百圍焱祖嘗以杏庭自號因以名集其詩以古近體分列然五言律下注曰長律附不從髙棅稱排律七言律下注曰拗律附亦宋人之舊名盖猶當日原本未遭明人竄亂者也其詩雖純沿宋調而尚有石湖劍南風格抗衡於虞楊范揭諸家則不足以視宋季江湖末派則蟬蜕於泥滓之中矣乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀杏庭摘稿原序杏庭居士集故徽州路休寧縣尹致仕洪先生所著詩文也先生諱焱祖字潛夫年廿有六為平江路儒學録浮梁州長薌書院山長紹興路儒學正調衢州路儒學敎授擢處州路遂昌縣主簿天厯元年年六十有二致其事去明年卒于家此先生之履歴也其為學官興修學舍其佐邑富民不敢蹐門土豪強買民田不收税壹為正之甲或敺乙瀕死反自其面以誣乙冀脱其罪先生卒坐甲訟由是息囹圄為空浦城偽鈔誣遂昌富者十有六家尉卒持公櫝至先生立遣之南有大溪遇霖雨不可涉乃捐廩禄為之倡作長橋夏旱禱于龍湫輒雨此先生之為政也初先生謁宋尚書方公逢辰于建徳方公大竒之其後客杭師事建徳守方公囘建徳與先生同郡先生之生父程公建徳同舍生也客信從學校授四明戴公表元游至若髙郵龔君繡吳興姚君式南城李君淦皆東南名士則又與之同僚此先生之師友也由是觀之先生終始可得知矣先生既沒其子在述其行以先生踐履純篤為政清慎邅囘半生位不充其才為痛余則解之曰前史所載丞相御史大夫大將軍名姓相望其穹官峻爵焜耀一世論其所可傳則蔑如也先生之文根極理要而憂深思逺超然游意於語言文字之表彼丞相御史大夫大將軍雖尊顯寧有是哉然則為在者可以無憾矣先生所著别有續新安志十卷爾雅翼音註三十二卷已刻于徽學其所居有銀杏大百圍故以為號因名其集云在以門廕為征官今調浦江尉將去京師屬余序其篇端迺為之書至正九年七月己亥應奉翰林文字文林郎同知制誥兼國史院編修官危素序杏庭摘槀序濓昔受學於河東公獲見新安洪先生詩十餘篇心甚樂之竊意先生之所述篇章必富而新安逺在數百里外常媿弗能一見先生以窺夫大全及河東公殁先生之子存心來為浦江尉濓始得悉受而伏讀之不覺嘆曰嗚呼是豈非詩哉夫詩未易言也商周之時三頌二雅泊夫十五國風之作既經孔子所刪列為一經固將與天地相為終始若秦漢以來至於近代其間雕肝琢腎以自馳騁於一世者不為不多果能傳之千萬載而弗泯幾何人哉縱傳矣求其無媿於孔子之删定者又㡬何人哉盖必有超絶之識充以包羅宇宙之象濟以俊偉光明無所不通之學然後始能與于斯不然則流連光景之辭爾尚得謂之詩矣乎新安為江東一大郡自舊多文學之士及吏部朱公兄弟以詩倡於建炎紹興間而作者益盛流風遺韵直至于今不衰先生之生雖後朱公百餘年嘗及接鄉之諸老故聞見甚多而講索甚精其發之於詩和而不怨平而不激嚴而不刻雅而不凡庻㡬忠厚惻怛有三百篇之遺意者嗚呼是豈非詩哉濓頗觀今人之所謁詩矣其上焉者傲睨八極呼噏風雷專以意氣奔放自豪其次也造為艱深之辭如醉夢人亂言使人三四讀終不能通其意又其次也傅粉施朱類燕姬越女巧自衒鬻於春風之前冀長安少年為之一顧詩之至此亦可哀矣求其如先生之作尚可多得耶濓方將謄置東明山中與二三子共學焉而存心以四方之士多願觀之俾濓摘其古今詩若干首鍥梓以傳先生之詩誠不宜無傳故濓特舉詩之未易言而先生絶出於今人者序之于首簡惜乎河東公墓木已拱無從質其説之然否也先生諱焱祖字濳夫自儒官起家四轉而為遂昌主簿遂以休寜縣尹致其事其善政可稱述而不係於詩者不書至正十五年春三月十五日金華後學宋濓序欽定四庫全書杏庭摘槀元洪焱祖撰五言古詩蠶婦辭貧家桑地狹買葉療蠶飢葉價貴如金賣釵仍典衣所得弗償費况乃筋力疲蕭條鏡中顔伊軋忩下機都將寸心苦織入千萬絲帛成不敢裁支梧廹公私端居被文繡媿爾西家施宿中灤曉出酸棗門暗與夷山别睡睫風沙濛凍須露華結小車駕雙驢箕踞坐卼臲野濶迷去程鐸鳴避來轍亭午過黄河濁浪半天掣雷聲撼乾坤土色暗日月雜以牛馬車百命托孤葉含靈幸有知帖妥無踶齧妄動或側欹均同一漚滅到岸已斜陽相慶猶餘懾人稠屋稍華炊過炕喜熱問名知中灤境壤衞輝接買飯直不廉年飢斷麯蘖旅卦尚資僕數竒我俱闕逺遊觸事非陋學謀身拙兹行似可笑内顧奚所挾體疲即就枕衾薄盡發篋淅淅瓦霰鳴前途明日雪文安縣文安𨽻霸州顯徳州始置蕭蕭風捲沙渺渺天裹地駞載雜驢車日落喧市肆酸虀芼湯餅我亦解鞍憇維昔石晉興結遼與共事割畀十六州貿易一閏位世宗取三關鋭意平幽薊破竹功垂成服藥志勿遂金甌竟莫完鐡硯真左計藝祖繼揮戈似亦欠乘勢後人不量力輕舉速顛躓中原百戰爭亂極數當治大物自有歸追思一長喟宿蒼嶺絶頂行窮磵百折始上深山高峥嶸歲年晩蹭蹬人馬勞積雪凍如鐡寒雨細於毛但見石犖确而聞草蕭騷亘古無日色白晝有鬼號谷甿驚過客奔竄㨗猿猱商賈虞剽刼出没森弓刀嶺半乃有店三州犬牙交歴險得一息詎敢輕衡茅飢炊甘如飴况覬豐饌醪嗟予本孱儒早與世故鏖欣怖從何生夢幻隨所遭昔賢仗忠信嶺海氣愈豪矧此奚足云内視固有操牕開風滅燭松響鶴歸巢思詩夜無寐霽月生林梢宛丘壽春之宛丘十日復五日河盤常山蛇舟舞宋都鷁途長冬景短坐卧厭跼蹐未知䟽鑿意何苦紆弗直恭惟大聖人環轍于斯厄神龍困泥沙祥鳯栖枳棘平原澹荒烟猶帯愠見色知士多嶮艱愚夫抱安逸有懐重徘徊延佇三太息路轉見孤村垣低出古驛過雨蔓菁青凉風木綿白林踈散鷄豚土廣饒菽麥紅裙揺清漪浣女秋波急桞邉當壚婦倚閣㸔過客數户賦一兵優游且殷實北人尚并兼差徭合衆力束矢莫能折牀膚詎剥及南人雖弟昆小戶亦縷析歲久弱弗支貪官肆蠶食何當此卜居賣書買璽栗黄巖盛景則來為吾郡征官見示詩文因成一章昔我遊公鄉瞻望弗及見公今仕吾州過從兩不倦人生水上萍邂逅隨風轉端能相知心豈在蚤識面髙文久自珍屢請容一眄如升泰山頂朝觀海日眩雲濤浮青紅光采生萬變新詩更圓美花暖嬌鶯囀忽疑龍掛天飛雨響銀箭嗚呼此事難補衮非襪線沉吟拊几案便欲棄筆硯終然齒未衰猶冀骨可換跪請九還訣晝夜鍜復鍊驂鸞侍逺覧八極如抹電寜同井底蛙局促自矜衒再用韵答景則風騷久寂寥作者未多見四靈晩唐家諷詠使人倦恭惟浣花翁下筆坤軸轉豈爲黄陳私萬世當北面海濶蒼天高未易窮睇眄吾曹夜迷方仰斗可無眩讀之三十年陋質稍覺變羡君得其髓不隨羣鳥囀出户合車轍兩鋒交快箭織成紫綃衣非假五色線官閒竹滿軒賔退雲生硯擊節獨長謠連城肯輕換春山芝术香委羽好修錬掛冠歸何時牛背射巖電逝將從遊歌抱月謹勿衒羣校思樂亭對酒髙齋俯逺山煙樹疑無地急雨破微晴餘春起秋思念彼荷蓑人原田各趨事勞生有近功實務非清議而我獨何為窮年守經笥講授信多娯撫躬祗自喟問政山行窮白雲塢歩入青松林飛花去人間好鳥鳴春隂黄冠雅好客瀹茗澹冲襟灑之幽蘭芬㺯以清泉音懷哉媚丹灶諒矣輕華簪常年聶仙子出處知何心徘徊揚州鶴悵望故山岑仙遊不可問古墓蓬蒿深次韵奉酬孟能靜見貽之什公生富貴家被服同寒俊一官成一集詩學源流正後生競傳誦心服非貎敬豈惟言語工先後典七郡鴟鴞懐好音鴻雁托安定紛華劇相攻不戰以道勝五十未為老臥疴謝朝請世議日以隘強起寜肯更憶昨臨新安味同獲親近一朝驚送别桀黠共相慶頃余續州乘特筆紀善政歲晏客衢城因風辱佳詠清時故將軍吾黨大司命後凋松柏姿彌烈薑桂性彼昏冒寵榮㑹有暗鬼偵相期身後名永與日星暎戴就東都有一士天賦豈尋常屈居倉曹掾衆未察所長一朝薛從事未按郡守贓收就錢唐圄五毒既偹嘗燒斧挾肘腋辭色愈慨慷焦毁肉墮地掇以充飢腸覆船薰馬通三日孰可當發視意其死大罵目方張鍼爪使杷土彭考無餘方寜死白于天終不枉忠良其事竟得釋太守免歸鄉我觀此丈夫性命輕毫芒心非兒女脆膚亦鐡石剛見義不見身遥恤支體傷古今㡬寃獄蔀屋埋日光由來獨行少史冊徒芬芳正月二十二日押綱離杭是夜泊舟浮山客船撥不開見船不見河官船亦齟齬䕶送煩麾訶逡廵各歛避容我躍丈波千篙正挿笋一隻俄騰梭出郭曉初分到江午已過日月互答吐海天相盪摩越樹緑攢薺吳山青㸃螺舍狹就空曠登仙超網羅將夕忽風順綱軍鳴鼔鑼上水㠶若箭夜宿依寒坡乘快終有險耐遲庻無它河江置勿論嗟我鬢既皤之官半載餘行路五月多下瘠上弗察孤清衆難知勞形兼費槖癡戀欲如何寓舍近溪有大木數章休暇輒遊息其間偶得二詩吏卒各已休獨歩風林下雨餘堤草青亦放庭前馬隔水呌黄鸝千山暗初夏非無可樂資孰是同情者春去不留花青隂滿山縣天生溪上林息我簿書倦濟世本無能觀心如有見攜瓢酌淸波三潄復三嚥永康道中懸崖忽褰開放目詩滿野千林併一青秀色森可把水光相映發農事皆幽雅誰遺孟諸樵汨没風塵下過貴義嶺入龍泉縣界原泉落青天當道巉翠壁界破一條虹東西流兩邑兩邑民頗淳不勞官置驛後村報前村輿夫歘然集慣行輕積險改負逞新力而我坐何安大半親降陟吁嘘鄰封訟使徃平曲直道䘮巧偽滋論公貪猥嫉愧爾荷鋤翁身劬心最逸七言古詩次韻府尹范松石逰柯橋天邉洞户長不扄洞口芝田龍自耕靈楳已逐風雨散飛花亂㸃仙人枰五馬踏雲山鬼驚九霞觴勸瑶琴鳴玉虹僵卧衆峯鎖雷斧剜開一竅明輕身欲跨碧煙去宿習要湔塵界清倚松黙念黄庭經酌泉更嚥紫石瑛飬聖懐胎十月滿子建吟詩七歩成歸來凝香灑醉墨三復使我迷魂醒次韵荅天台楊景羲擬杜陵曲江體五首天台山深秋月明幽人見月偏多情伐木𢋫詩求友生我亦彈琴不成調風清露冷越江横快劍斫水水不絶同心何恨音書闕莪蒿兩地中腸熱還憐瘦馬繫空堦得似青鞋踏沙月百川赴海海不滿志士意長日月短金丹九轉成功晩台山采藥聽清猿剩欲投簪寄閒散城中幘峯高挿天竹房煑茗僧汲泉半江雲影危闌前秋風吹去一隻鶴老我回頭三十年洞天夜讌桃花下座中都是能文者銀燭穿山閙車馬當年此會幾人存安得雲龍逐東野題魚浦晩歸圖近村寂寞孤炊起逺樹㣲茫沽酒市桞絲高掛新月鈎平者是沙流者水黄頭攤網兒刺船腥風瑟瑟魚平舷沙鳥背人羣欲睡林禽追棹去相先千金何處得此紙咫尺煙波含萬里不納租庸過一生提魚換酒仍賖米仙源路逺桃花殘人間踏地多驚湍珍重江湖釣竿手莫遮西日向長安大雨次韵劉成徳斷鼇立極水倒流當時何處辨九州𤣥圭告成緑字顯下有桑土高山丘六甲乾坤納壬癸習坎卦中雲雨起女丁婦壬傳世婚相王休因此常理如何祝融灰不然今年㝠頊獨司天隂旌髙張帝鼔閙逆捲平陸成奔川驚心白晝重泉杳素練當簷垂未了徹夜彌加氣勢酣兼旬猶恨滂沱少思徴麥麯醫河魚何惜千金購提壺火烏濡翅飛不得怒鼉撞城來突如揭竿求子紛呌喘沉竈産蛙多嘆吁試登岡阜望原野彷彿天吳掛海圗我聞五行各有叙月離于畢工招雨桃花紅綻壯波濤梅子黄肥蒸溽暑焉知極偹反致凶蕩析盖藏埋棟宇照泥占星信屢騐灼蔡卜晴殊未許列仙高居瓊樓深赤子坐受顛崖苦為糜食餓豈無人禱社榮門傳自古衢牧范松石為余作秋江晩渡圗風㠶已落山生烟霜葉半紅新雁天野店小橋通綫路孤峯古寺斜陽邉荷擔驅驢者誰子滿衣山翠凉娟娟一人趂渡出沙際何處撑來鷗外船使君為我圖此景披閱令人發深省一日將昏一歲秋大似百年逢老境如何抛却雲水鄉縂是埋頭聲利塲早覔家居到彼岸莫待月黒迷津航揺兀篇官輿兀兀官船揺日百廿里馳輕飆輿夫舟子氣色驕老我揺兀不自聊顛頓肺腸酸髀腰體疲寒熱來如潮昏暮稍憇沽酒澆鷄啼蓐食愁明朝更愁椎鼓發中宵翻羹倒釡弗停橈憶乘下澤何逍遥誤落塵網中心焦古人所見何其遼尚厭聒耳棄一瓠渠肯受此風旌飄五言律詩長律附鳯凰洲有許閒田地惟宜牧馬牛平生未到處極目更清秋緑水來桐柏青山入壽州斜陽無限意落雁鳯凰洲長薌歲暮二首隂陰四山合杳杳一川平暮色雜歌哭年光催死生灶陘芬糗餌家廟潔粢盛骨肉望歸切何由風翮輕落日窻未掩忘言几獨憑鄉心生逺嶠節意入孤燈吾道虎為鼠何時鵾化鵬歲年渾不吝亹亹向人增浮梁秋曉書事三首竟日風兼雨荒山坐復眠收心𦵏書窟飛夢入詩天寗戚歌牛下昌黎拜馬前卿當用卿法我懶覺猶賢舜陶開利孔山骨竟為虀野碓多舂土溪船半載泥風煙秋更慘瓦礫路全迷隨牒何來此無階老稚圭衆山圍我獨極目但風烟政自門無轍何湏坐有氊謫龍才七日鳴鳥待三年豈不心如鐡居然髪早宣彭城懐古二首霸業重瞳子雄才大耳兒河山猶表裏今古㡬興衰彭祖終遺墓蘇公僅有碑伊誰居里閈寒餓得聞思户口十餘萬承平亦富哉人烟今寂寞洪勢自喧豗可有名駒子空餘戲馬臺登臨興不盡挽䌫故相催歲前立春死草能重碧蒼顔得再韶春從年内到雪向雨中消小甕醅新漉芳郊薺可挑從今抛筆硯一意事漁樵寓杭有感二首此郡頻來徃如今四十年舊交多不在吾老亦非前山寺添新塔江潮閱㡬船湖邉閒眺望寂寂鏡中天一器成初售爭先様又新低昂百工手皷舞四方人雕刻知何極漸磨豈易淳光隂併紅紫衮衮付泥塵上饒送别戴丈帥初濮上音如沸房中樂浸微夫君魯一變餘子鄶亡譏客路班荆晩平生刻楮非公歸我亦去歲晏重依依遂昌紀事萬嶂周遭立雙溪㑹合流雖晴雲可掬但雨漲堪憂嶺不通商擔湍偏拒客舟穹林長似暮亂石自生秋僻壌連衢婺遺風染粤甌百家成聚落何地許遨遊曉市花猪肉宵檠菜子油清醇誇好酒白粲勝他州富貨資杉栰貧羹仰芋疇伺窺多鬼蜮談笑乏朋儔俗樂軍中借歌筵夢裹求畫仙丹灶冷詩衲翠峯幽縣南有瑞山蕭梁時葉先生得道騎虎上升丹井猶存繼之者范子珉亦尸解范善畵牛縣北十八里翠峯菴五代僧貫休所居箭竹尋常采綿華𤨏屑收銀坑歸武斷鐡冶費冥搜野性常輕死官方亦欠優昔常騷冦賊今幸偃戈矛歲熟寛租賦庭空省繫囚扶顛如有策安分復奚尤七言律詩拗律附朝元宫雙閣通明暎太㣲玉皇金殿邃朱扉照天萬瓦琉璃動跨水三橋螮蝀飛中土角蝸今日定七真笙鶴㡬時歸前朝教主多遺迹難把興亡問羽衣艮岳龍檜金芝久鞠𬞞絳樓遺址野人居空餘靈壁太湖石好在玉京仙掌書一片猶須萬牛力層巔遑恤九州墟𤣥門不救青城禍千載排空志覆車艮岳石刻有所謂玉京獨秀太平巖崆峒仙掌諸峯尚無恙荆山閉户徒勞孫敬學浪遊别換子長文方穿甓社珠宫月又泛荆山玉窟雲淮水西來千騎㨗渦河北下九天聞會同齊赴南溟逺清濁如將獺膽分淮清河濁㑹于荆山之下自會稽如武林大禹山頭秋葉飛伍胥廟下暮潮歸觧貂換酒風流在放鶴尋僧伴侣稀漁唱樵謳入詩卷巖烟谷雨冷征衣行年懶問君平卜更㸔天河織女機瓶笙離坎絪緼一氣盈媧皇遺調自天成滿堂静聴不知處從古善吹無此聲守口似違平日誡熱中能作許時鳴世間有韻皆因激火冷夜深空月明次韻陳山長送春紀事二首恠事凶荒有此年春來癘鬼更行天為誰鶯燕語能好無主麥桑青可憐誰謂十旬全渴雨坐令萬井不生烟相逢且喜身俱健困厄終勝死道邉越上今春不見春花枝憔悴桞眉顰嗟公縲絏元非罪笑我儒冠早誤身睡起烹茶聊永日饑來乞米向何人相期辟穀仙山去行止毋勞問大鈞一笑一笑難逢天下白相㸔誰免甑中塵荷花香斷官湖淺紙竹叢深山聚貧好向西湖徙遊惰盡歸東土闢荆榛淳熈使者祠堂冷荒政文移墨尚新文公救荒案牘具存稽山書院次韻王監簿曉荷胎息初匀飬玉池曉風殘月見花竒妙香偏向推窻覺清意未教擕酒知神女行雲廻夢後太真餐露解酲時天星寥落佳人逺手折幽芳欲贈誰次韵萬紅中一朶白蓮之作龍涎萬斛絳雲重彼美西人一粲逢獺髓無痕氷作骨羽衣初試水為容瑶池燕罷醒㸔醉月殿粧來淡勝濃未許何郎能闘潔詩仙玉立衆賔從次韻春懷鳩喚春陰鵲噪晴静中觀動晦還明山林歲月身將老湖海風濤夢亦驚不飲未應為酒困忘言何用以詩鳴㸔花啜茗須公軰湯熟銀瓶細細傾送李明徳上合肥縣尹未拜柏臺真御史暫為花縣古諸侯詩書河北無雙士山水淮西第一州但學此邦包孝肅會㸔今世魯中牟龜峯目送風㠶逺别後新文肯寄不解官西歸今日身輕棹更輕柯橋碁局且推枰公心豈免招私謗古道猶須狥俗情萬事不如歸最好諸人方以出為榮江風只説商船險漁艇逍遥過一生四月二十八日離杭泝江喜晴得風抖擻城中萬斛埃天晴眼豁意悠哉江經馬目排雲下潮到桐廬帯月迴價壓紅陳新麥熟光生緑暗早榴開吟情欲緩官船急夜半風㠶過釣臺新歲言懐雨滲春蕪緑似油官居溪屋冷於秋與錢久已無司業束帯猶須見督郵氷檗三年人共笑虀鹽半世老何求交承只待西風起賣却羸驂買去舟蒼嶺浙東斯嶺何巍然雪雨在下人行天千年石上恠松偃六月岩前寒溜懸危途羊腸不可並秀色雁蕩遥相連終朝寂寂商旅斷忽遇樵叟疑其仙舟次嘉禾昨宵雨急爭過堰今日風顛俱泊船前途難料毎若此遊子相顧空悽然挽弓翻勝一丁字佩印何如二頃田笠澤鱸魚洞庭橘誰家酒樓新挿天春晴行園新歲以來晴旦稀鵲聲忽報金烏飛煙光染深草色紺雪水融入花根肥懸弧在昔端有志抱甕如今甘息機多情蜂蝶想自得先我到此遊芳菲初冬晴暖歴永康武義金華三縣境賦呉體以紀之我行婺女愛平陛遠勝括山多澗岡千林桕子凍的皪数㸃梅蕚春㣲茫窮簷炙背傲行客新店當壚多艶粧薑疇蔗壠不足筭木綿軋軋霜機張絶句歌風臺二首可是歌風念故鄉匹夫萬乗豈尋常不知身後閨門禍只道無人守四方暮年鴻鵠發悲歌不似歌風慷慨多霸氣雄心加海内却從袵席暗消磨汴學朝元競詫新宫麗相國猶存古寺雄壁水枯荷人不到石經零落臥秋風瓊花觀彩雲飛入玉皇家后土秋風更有花壇上雕闌圍贗本遊人無数賞仙葩題楊妃圗自是三郎溺燕私千年禍水説蛾眉驪姬殺子九齡去妾在壽王宫裏時越飢謡六首冶翠妖紅滿境湖扁舟曾繫緑楊株重來風物今如許安上門前舊畫圗野無青草樹無膚人腹為棺𦵏萬夫落日臥龍山下路腥烟數里鬼相呼攫一杯糠欲下咽疾風如走雨如拳饑腸未補身先毁不暇憐人不自憐骨肉相吞已可吁城中高下井皆枯此時斗水錢三百山客苞封致一壺萬花風雨總飄零抹粉塗朱鬻斗升太平纍纍渡江去此生從此别西興西望繁華舊鳯城隔衣帯水自昇平越鄊三月未春意漸死漸空無哭聲曉出跨湖橋扁舟東下却西還秋在湖光欲曙間送客出城無吝色青青惟有卧龍山甲子元夕二首燈市羣嬉綵服鮮回頭追憶少年年何曾得似渠儂樂未有生時已不天四十年來懶㸔燈元宵長是守書檠如今并與書檠廢只有丹心對月明讀名臣言行録有感二首太平宰相十分賢惜也天書一髪愆只為尊珠曾受賜嬋娟不與駐長年強將神道釋河圗倉卒還憐杜鎬愚恠底歐公全不信分明立教矯祥符劉山驛山當驛舍恰中分地隔人煙斷見聞使客來眠清到骨夜忩燈㸃半天雲縣㕔獨坐瑞山花發雜青紅案牘全稀犴獄空𢾗片閒雲窺使散飛來庭下舞輕風中秋宿貴義嶺下是夜無月亂山深處過中秋只有風湍拍石頭賴是今宵無月色若令月出轉添愁馮公嶺路遶朱闌一文寛須臾平地上雲端承平事事加開闢蜀道如今未必難
